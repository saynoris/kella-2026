<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kella 2026 — Michael &amp; Emmanuella</title>
<style>
  :root{
    --ink:#3d2a18;
    --gold:#b8892f;
    --gold-bright:#e8c874;
    --cream:#f4ead6;
    --stage-1:#1b1108;
    --stage-2:#2c1c0f;
    --shadow: rgba(20,10,0,0.55);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    min-height:100dvh;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(232,200,116,0.10), transparent 55%),
      radial-gradient(ellipse at 75% 80%, rgba(184,137,47,0.12), transparent 55%),
      linear-gradient(160deg, var(--stage-1), var(--stage-2) 60%, #150c06);
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--cream);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    touch-action: none;
  }

  @font-face{
    font-family:'Cormorant';
    src:local('Cormorant Garamond');
  }

  /* ambient floating gold motes */
  .motes{ position:fixed; inset:0; pointer-events:none; z-index:0; }
  .mote{
    position:absolute;
    width:3px; height:3px;
    border-radius:50%;
    background: var(--gold-bright);
    opacity:0.35;
    filter: blur(0.5px);
    animation: drift linear infinite;
  }
  @keyframes drift{
    0%{ transform: translateY(0) translateX(0); opacity:0; }
    10%{ opacity:.5; }
    90%{ opacity:.4; }
    100%{ transform: translateY(-100vh) translateX(20px); opacity:0; }
  }

  /* ---------- intro overlay ---------- */
  #intro{
    position:fixed; inset:0; z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at center, #241505 0%, #120a04 75%);
    animation: introFade 900ms ease-out 3400ms forwards;
  }
  #intro .hearts{
    font-size:38px;
    color: var(--gold-bright);
    text-shadow: 0 0 18px rgba(232,200,116,0.6);
    opacity:0;
    animation: heartsIn 1200ms ease-out 200ms forwards;
    letter-spacing: 6px;
  }
  #intro h1{
    font-size: clamp(28px, 8vw, 44px);
    letter-spacing: 6px;
    font-weight: 400;
    margin: 18px 0 6px;
    opacity:0;
    color: var(--gold-bright);
    animation: riseIn 900ms ease-out 900ms forwards;
    text-align:center;
  }
  #intro p{
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity:0;
    color: rgba(244,234,214,0.7);
    animation: riseIn 900ms ease-out 1300ms forwards;
  }
  #intro .line{
    width:0;
    height:1px;
    background: linear-gradient(90deg, transparent, var(--gold-bright), transparent);
    margin: 16px 0;
    animation: lineIn 900ms ease-out 1700ms forwards;
  }
  @keyframes heartsIn{ from{opacity:0; transform: scale(0.6);} to{opacity:1; transform:scale(1);} }
  @keyframes riseIn{ from{opacity:0; transform: translateY(14px);} to{opacity:1; transform:translateY(0);} }
  @keyframes lineIn{ from{width:0;} to{width:140px;} }
  @keyframes introFade{ to{ opacity:0; visibility:hidden; pointer-events:none; } }

  /* ---------- stage ---------- */
  #stage{
    position:relative;
    height:min(80dvh, 640px);
    width:auto;
    max-width:92vw;
    aspect-ratio: 512/768;
    perspective: 2400px;
    z-index:1;
    opacity:0;
    animation: stageIn 1000ms ease-out 3200ms forwards;
  }
  @keyframes stageIn{ from{opacity:0; transform: translateY(10px) scale(0.97);} to{opacity:1; transform:translateY(0) scale(1);} }

  .book{
    position:absolute; inset:0;
    border-radius: 6px;
    box-shadow: 0 30px 70px var(--shadow), 0 0 0 1px rgba(232,200,116,0.15);
  }

  .page{
    position:absolute; inset:0;
    border-radius: 6px;
    overflow:hidden;
    background: #efe4cc;
    transform-style: preserve-3d;
    transform-origin: left center;
    transition: transform 900ms cubic-bezier(.65,.05,.36,1), box-shadow 900ms ease;
    backface-visibility: hidden;
  }
  .page .backdrop{
    position:absolute; inset:0;
    background-size:cover;
    background-position:center;
    filter: blur(22px) brightness(0.6) saturate(1.15);
    transform: scale(1.2);
    z-index:0;
  }
  .page img{
    position:relative;
    z-index:1;
    width:100%; height:100%; object-fit:cover; display:block;
    -webkit-user-drag:none; user-select:none;
    touch-action:none;
    transform-origin: center center;
    will-change: transform;
  }
  .page .sheen{
    position:absolute; inset:0;
    background: linear-gradient(115deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 30%);
    mix-blend-mode: overlay;
    pointer-events:none;
  }
  .page .spine-shadow{
    position:absolute; top:0; bottom:0; left:0; width:14%;
    background: linear-gradient(90deg, rgba(0,0,0,0.35), transparent);
    pointer-events:none;
    opacity:0;
    transition: opacity 900ms ease;
  }

  /* z-index / turning states */
  .page{ z-index:1; }
  .page.is-turned{ transform: rotateY(-178deg); box-shadow: -18px 0 40px rgba(0,0,0,0.35) inset; z-index:2; }
  .page.is-turned .spine-shadow{ opacity:1; }
  .page.is-active{ z-index:3; }
  .page.is-flipping{ z-index:4; }

  /* tap zones */
  .tap-zone{
    position:absolute; top:0; bottom:0; width:26%;
    z-index:10; cursor:pointer;
  }
  .tap-zone.left{ left:0; }
  .tap-zone.right{ right:0; }
  #stage.is-zoomed .tap-zone{ pointer-events:none; }

  /* zoom controls */
  .zoom-controls{
    position:absolute; top:10px; right:10px;
    z-index:25;
    display:flex; flex-direction:column; gap:8px;
  }
  .zoom-btn{
    width:34px; height:34px;
    border-radius:50%;
    background: rgba(20,12,4,0.45);
    border: 1px solid rgba(232,200,116,0.4);
    color: var(--gold-bright);
    font-size:18px; line-height:1;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    backdrop-filter: blur(4px);
    user-select:none;
    transition: transform 150ms ease, opacity 300ms ease;
  }
  .zoom-btn:active{ transform: scale(0.88); }
  .zoom-btn.disabled{ opacity:0.35; pointer-events:none; }

  .zoom-hint{
    position:absolute; top:12px; left:12px;
    z-index:25;
    font-size:9px; letter-spacing:1.5px; text-transform:uppercase;
    color: rgba(244,234,214,0.55);
    background: rgba(20,12,4,0.35);
    border: 1px solid rgba(232,200,116,0.2);
    padding: 4px 9px;
    border-radius: 999px;
    backdrop-filter: blur(4px);
    opacity:0;
    transition: opacity 400ms ease;
    pointer-events:none;
  }
  .zoom-hint.show{ opacity:0.9; }

  /* nav arrows */
  .arrow{
    position:absolute; top:50%; transform:translateY(-50%);
    width:38px; height:38px;
    border-radius:50%;
    background: rgba(20,12,4,0.35);
    border: 1px solid rgba(232,200,116,0.4);
    color: var(--gold-bright);
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
    z-index:20;
    backdrop-filter: blur(4px);
    transition: opacity 300ms ease, transform 200ms ease;
    cursor:pointer;
  }
  .arrow:active{ transform: translateY(-50%) scale(0.9); }
  .arrow.prev{ left:-16px; }
  .arrow.next{ right:-16px; }
  .arrow.hidden{ opacity:0; pointer-events:none; }

  /* dots */
  #dots{
    position:fixed; left:0; right:0; bottom:22px;
    display:flex; justify-content:center; gap:10px;
    z-index:5;
    opacity:0;
    animation: riseIn 800ms ease-out 3600ms forwards;
  }
  .dot{
    width:7px; height:7px; border-radius:50%;
    background: rgba(244,234,214,0.3);
    transition: all 350ms ease;
  }
  .dot.active{
    background: var(--gold-bright);
    box-shadow: 0 0 8px rgba(232,200,116,0.8);
    transform: scale(1.3);
  }

  #hint{
    position:fixed; left:0; right:0; bottom:44px;
    text-align:center; z-index:5;
    font-size: 11px; letter-spacing:3px; text-transform:uppercase;
    color: rgba(244,234,214,0.45);
    opacity:0;
    animation: hintPulse 3s ease-in-out 4200ms infinite;
  }
  @keyframes hintPulse{
    0%,100%{ opacity:0.35; transform:translateY(0);}
    50%{ opacity:0.75; transform:translateY(-2px);}
  }

  #credit{
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 6;
    display:flex;
    align-items:center;
    gap:7px;
    padding: 6px 10px 6px 6px;
    border-radius: 999px;
    background: rgba(20,12,4,0.35);
    border: 1px solid rgba(232,200,116,0.25);
    backdrop-filter: blur(4px);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 500ms ease, transform 500ms ease;
    pointer-events: none;
  }
  #credit.show{
    opacity: 0.85;
    transform: translateY(0);
    pointer-events: auto;
  }
  #credit img{
    width: 18px; height: 18px; object-fit: contain; display:block;
  }
  #credit span{
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(244,234,214,0.75);
    white-space: nowrap;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div class="motes" id="motes"></div>

<div id="intro">
  <div class="hearts">♥ ♥</div>
  <h1>Kella 2026</h1>
  <div class="line"></div>
  <p>Michael &amp; Emmanuella</p>
</div>

<div id="stage">

</div>

pages.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'page' + (i===0 ? ' is-active' : '');
  el.style.zIndex = pages.length - i;
  el.innerHTML = `${p.fit === 'contain' ? `<div class="backdrop" style="background-image:url('${p.src}')"></div>` : ''}

                   <div class="spine-shadow"></div>`;

  const dot = document.createElement('div');
  dot.className = 'dot' + (i===0 ? ' active' : '');
  dotsEl.appendChild(dot);
});

const zoomOutBtn = document.getElementById('zoomOutBtn');
const zoomHint = document.getElementById('zoomHint');

const MIN_SCALE = 1;
const MAX_SCALE = 3;
let scale = 1, panX = 0, panY = 0;

function activeImg(){
  return pageEls[current].querySelector('img');
}

function applyTransform(immediate){
  const img = activeImg();
  img.style.transition = immediate ? 'none' : 'transform 220ms ease';
  img.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  stage.classList.toggle('is-zoomed', scale > 1.02);
  zoomOutBtn.classList.toggle('disabled', scale <= MIN_SCALE + 0.02);
  zoomInBtn.classList.toggle('disabled', scale >= MAX_SCALE - 0.02);
}

function clampPan(){
  const rect = pageEls[current].getBoundingClientRect();
  const maxPanX = (scale - 1) * rect.width / 2;
  const maxPanY = (scale - 1) * rect.height / 2;
  panX = Math.max(-maxPanX, Math.min(maxPanX, panX));
  panY = Math.max(-maxPanY, Math.min(maxPanY, panY));
}

function setScale(newScale){
  scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
  if(scale <= MIN_SCALE + 0.001){ panX = 0; panY = 0; }
  clampPan();
  applyTransform(false);
}

function resetZoomAll(){
  pageEls.forEach(el => {
    const img = el.querySelector('img');
    img.style.transition = 'none';
    img.style.transform = 'translate(0px, 0px) scale(1)';
  });
  scale = 1; panX = 0; panY = 0;
  stage.classList.remove('is-zoomed');
  zoomOutBtn.classList.add('disabled');
  zoomInBtn.classList.remove('disabled');
}

function updateArrows(){
  prevBtn.classList.toggle('hidden', current === 0);
  nextBtn.classList.toggle('hidden', current === pages.length - 1);
}

function goTo(index){
  if(index < 0 || index > pages.length - 1 || index === current || isAnimating) return;
  isAnimating = true;
  resetZoomAll();

  if(index > current){
    // turn forward
    for(let i = current; i < index; i++){
      pageEls[i].classList.add('is-turned');
      pageEls[i].classList.remove('is-active');
    }
  } else {
    for(let i = current - 1; i >= index; i--){
      pageEls[i].classList.remove('is-turned');
    }
  }

  current = index;
  dotEls.forEach((d,i) => d.classList.toggle('active', i === current));

  setTimeout(() => {
    pageEls.forEach((el,i) => el.classList.toggle('is-active', i === current));
    isAnimating = false;
    updateArrows();
  }, 920);
}

document.getElementById('zoneLeft').addEventListener('click', () => { if(scale <= 1.02) goTo(current - 1); });
document.getElementById('zoneRight').addEventListener('click', () => { if(scale <= 1.02) goTo(current + 1); });
prevBtn.addEventListener('click', (e) => { e.stopPropagation(); goTo(current - 1); });
nextBtn.addEventListener('click', (e) => { e.stopPropagation(); goTo(current + 1); });

document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowRight') goTo(current + 1);
  if(e.key === 'ArrowLeft') goTo(current - 1);
  if(e.key === '+' || e.key === '=') setScale(scale + 0.4);
  if(e.key === '-') setScale(scale - 0.4);
});

// swipe support (disabled while zoomed in)
let touchStartX = 0;
stage.addEventListener('touchstart', (e) => {
  if(scale > 1.02 || e.touches.length > 1) return;
  touchStartX = e.touches[0].clientX;
}, {passive:true});
stage.addEventListener('touchend', (e) => {
  if(scale > 1.02) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 40){
    if(dx < 0) goTo(current + 1);
    else goTo(current - 1);
  }
}, {passive:true});

/* ---------- pinch, pan & double-tap zoom ---------- */
const pointers = new Map();
let pinchStartDist = 0;
let pinchStartScale = 1;
let panStart = null;

function dist(p1, p2){
  return Math.hypot(p1.x - p2.x, p1.y - p2.y);
}

book.addEventListener('pointerdown', (e) => {
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(pointers.size === 2){
    const pts = Array.from(pointers.values());
    pinchStartDist = dist(pts[0], pts[1]);
    pinchStartScale = scale;
  } else if(pointers.size === 1 && scale > 1.02){
    panStart = {x:e.clientX - panX, y:e.clientY - panY};
  }
});

book.addEventListener('pointermove', (e) => {
  if(!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});

  if(pointers.size === 2){
    const pts = Array.from(pointers.values());
    const newDist = dist(pts[0], pts[1]);
    if(pinchStartDist > 0){
      const next = pinchStartScale * (newDist / pinchStartDist);
      scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, next));
      if(scale <= MIN_SCALE + 0.001){ panX = 0; panY = 0; }
      clampPan();
      applyTransform(true);
    }
  } else if(pointers.size === 1 && panStart && scale > 1.02){
    panX = e.clientX - panStart.x;
    panY = e.clientY - panStart.y;
    clampPan();
    applyTransform(true);
  }
});

function endPointer(e){
  pointers.delete(e.pointerId);
  panStart = null;
  if(pointers.size < 2) pinchStartDist = 0;
  activeImg().style.transition = 'transform 220ms ease';
}
book.addEventListener('pointerup', endPointer);
book.addEventListener('pointercancel', endPointer);
book.addEventListener('pointerleave', endPointer);

// double-tap / double-click to zoom
let lastTap = 0;
book.addEventListener('pointerdown', (e) => {
  const now = Date.now();
  if(now - lastTap < 320 && pointers.size <= 1){
    if(scale > 1.02){
      setScale(1);
    } else {
      const rect = activeImg().getBoundingClientRect();
      const offsetX = (e.clientX - rect.left - rect.width/2) / rect.width;
      const offsetY = (e.clientY - rect.top - rect.height/2) / rect.height;
      setScale(2.2);
      panX = -offsetX * rect.width * 0.6;
      panY = -offsetY * rect.height * 0.6;
      clampPan();
      applyTransform(false);
    }
    hideZoomHint();
  }
  lastTap = now;
});

zoomInBtn.addEventListener('click', (e) => { e.stopPropagation(); setScale(scale + 0.5); hideZoomHint(); });
zoomOutBtn.addEventListener('click', (e) => { e.stopPropagation(); setScale(scale - 0.5); hideZoomHint(); });

function hideZoomHint(){ zoomHint.classList.remove('show'); }

updateArrows();
document.getElementById('credit').classList.add('show');
zoomOutBtn.classList.add('disabled');

setTimeout(() => {
  zoomHint.classList.add('show');
  setTimeout(hideZoomHint, 3800);
}, 3600);

// ambient motes
const motesWrap = document.getElementById('motes');
for(let i=0;i<22;i++){
  const m = document.createElement('div');
  m.className = 'mote';
  const size = 2 + Math.random()*2;
  m.style.width = size+'px';
  m.style.height = size+'px';
  m.style.left = Math.random()*100+'vw';
  m.style.bottom = (-10 - Math.random()*10)+'vh';
  m.style.animationDuration = (10 + Math.random()*14)+'s';
  m.style.animationDelay = (Math.random()*10)+'s';
  motesWrap.appendChild(m);
}
</script>
